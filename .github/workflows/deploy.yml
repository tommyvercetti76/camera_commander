name: Deploy to Firebase

on:
  push:
    branches: [main]

# SETUP REQUIRED:
# Add FIREBASE_SERVICE_ACCOUNT to GitHub repository secrets.
# Value: the contents of a Firebase service account JSON.
# Generate at: Firebase Console → Project Settings → Service Accounts → Generate new key
# Add the secret at: GitHub repo → Settings → Secrets → Actions → New repository secret
# The secret value is ONLY stored in GitHub Secrets — never in the codebase.

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Install Web dependencies
        run: npm ci
        working-directory: web

      - name: Build Web
        run: npm run build
        working-directory: web

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: kaaykostore
