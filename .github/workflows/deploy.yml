name: Deploy to Firebase

on:
  push:
    branches: [main]

# SETUP REQUIRED:
# Add FIREBASE_SERVICE_ACCOUNT to GitHub repository secrets.
# Value: the full contents of a Firebase service account JSON.
# Generate at: Firebase Console → Project Settings → Service Accounts → Generate new key
# Add the secret at: GitHub repo → Settings → Secrets → Actions → New repository secret
# The secret value is ONLY stored in GitHub Secrets — never in the codebase.

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Install Web dependencies
        run: npm ci
        working-directory: web

      - name: Build Web
        run: npm run build
        working-directory: web

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Cloud Functions
        run: |
          gcloud functions deploy api \
            --runtime=nodejs20 \
            --trigger-http \
            --allow-unauthenticated \
            --source=./api \
            --entry-point=api \
            --project=kaaykostore \
            --region=us-central1

      - name: Deploy Hosting
        run: npx firebase-tools@latest deploy --only hosting --project kaaykostore --non-interactive
